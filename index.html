<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treasure Spots</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <h1>Treasure Spots</h1>
        <p>Discover hidden gems like Google Maps, but curated.</p>
      </div>

      <div class="filters-card">
        <h2>Choose Location</h2>

        <label for="countrySelect">Country</label>
        <select id="countrySelect">
          <option value="">Select country</option>
        </select>

        <label for="citySelect">City</label>
        <select id="citySelect" disabled>
          <option value="">Select city</option>
        </select>

        <button id="resetFiltersBtn" class="secondary-btn">Reset filters</button>
      </div>

      <div class="route-card">
        <h2>Route</h2>
        <label for="travelModeSelect">Travel mode</label>
        <select id="travelModeSelect">
          <option value="DRIVING">Driving</option>
          <option value="WALKING">Walking</option>
        </select>

        <button id="useMyLocationBtn" class="primary-btn">Use my location</button>
        <p id="locationStatus" class="status-text">No origin selected yet.</p>
      </div>

      <div class="places-list-card">
        <div class="places-header">
          <h2>Places</h2>
          <span id="resultsCount">0</span>
        </div>

        <div id="placesList" class="places-list"></div>
        <p id="emptyPlacesMessage" class="empty-message">
          Choose a country and city to show treasure spots.
        </p>
      </div>

      <div class="directions-card">
        <h2>Directions</h2>
        <div id="directionsPanel" class="directions-panel">
          Select a place and get route directions here.
        </div>
      </div>
    </aside>

    <main class="map-area">
      <div class="top-search-bar">
        <div id="searchBoxHost" class="search-host"></div>
      </div>

      <div id="map"></div>
    </main>
  </div>

  <script src="script.js"></script>
  <script
    async
    defer
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&v=weekly&loading=async&libraries=places,marker&callback=initApp"
  ></script>
</body>
</html>
