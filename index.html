<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treasure Spots Globe</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <h1>Treasure Spots</h1>
        <p>Explore hidden gems on a 3D globe.</p>
      </div>

      <div class="card">
        <h2>Choose Location</h2>

        <label for="countrySelect">Country</label>
        <select id="countrySelect">
          <option value="">Select country</option>
        </select>

        <label for="citySelect">City</label>
        <select id="citySelect" disabled>
          <option value="">Select city</option>
        </select>

        <button id="resetFiltersBtn" class="secondary-btn">Reset Filters</button>
      </div>

      <div class="card">
        <div class="places-header">
          <h2>Places</h2>
          <span id="resultsCount">0</span>
        </div>

        <div id="placesList" class="places-list"></div>
        <p id="emptyPlacesMessage" class="empty-message">
          Choose country and city to show places.
        </p>
      </div>
    </aside>

    <main class="globe-area">
      <div id="globeViz"></div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
