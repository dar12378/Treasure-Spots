<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treasure Spots</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>
<body>
  <header class="hero">
    <div class="overlay">
      <nav class="navbar">
        <h1 class="logo">Treasure Spots</h1>
        <button id="showFavoritesBtn" class="nav-btn">Favorites</button>
      </nav>

      <div class="hero-content">
        <h2>Discover hidden gems in your city</h2>
        <p>Find beautiful, quiet, and unique places worth exploring.</p>
        <a href="#spotsSection" class="explore-btn">Explore Spots</a>
      </div>
    </div>
  </header>

  <main>
    <section id="mapSection" class="section">
      <h2 class="section-title">Explore on the Map</h2>
      <div id="map"></div>
    </section>

    <section id="spotsSection" class="section">
      <h2 class="section-title">Featured Treasure Spots</h2>
      <div id="spotsContainer" class="spots-grid"></div>
    </section>

    <section id="favoritesSection" class="section hidden">
      <div class="section-header">
        <h2 class="section-title">Your Favorite Spots</h2>
        <button id="backToSpotsBtn" class="back-btn">Back to All Spots</button>
      </div>
      <div id="favoritesContainer" class="spots-grid"></div>
      <p id="emptyFavoritesMessage" class="empty-message">
        You have no favorite spots yet.
      </p>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 Treasure Spots. Explore your city differently.</p>
  </footer>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="script.js"></script>
</body>
</html>
